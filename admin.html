<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Book Admin - Mia & Mahesa</title>
    <!-- Use the same base font/theme if desired, or a clean admin font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --maroon: #4a0d17;
            --tan: #eedcd3;
            --dark-tan: #dcbfae;
            --light-maroon: #6a3d3a;
            --font-main: 'Montserrat', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--tan);
            color: var(--maroon);
            margin: 0;
            padding: 20px;
        }

        .admin-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--maroon);
            margin-top: 0;
            border-bottom: 2px solid var(--dark-tan);
            padding-bottom: 15px;
        }

        .guest-form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: var(--dark-tan);
            padding: 20px;
            border-radius: 10px;
        }

        .guest-input {
            flex: 1;
            padding: 12px;
            border: 2px solid transparent;
            border-radius: 8px;
            font-family: var(--font-main);
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .guest-input:focus {
            border-color: var(--maroon);
        }

        .guest-btn {
            background-color: var(--maroon);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .guest-btn:hover {
            opacity: 0.9;
        }

        .guest-btn:active {
            transform: scale(0.95);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: var(--maroon);
            color: white;
            font-weight: 600;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-hadir {
            background-color: #d4edda;
            color: #155724;
        }

        .status-tidak {
            background-color: #f8d7da;
            color: #721c24;
        }

        .status-pending {
            background-color: #fff3cd;
            color: #856404;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: #dc3545;
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.2s;
        }

        .action-btn:hover {
            color: #a71d2a;
        }
        
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #666;
            font-style: italic;
        }

        /* Loading Overlay */
        #loader {
            text-align: center;
            padding: 20px;
            font-style: italic;
            color: var(--light-maroon);
        }
        
        /* Link generator styling */
        .link-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f1f1f1;
            padding: 8px;
            border-radius: 6px;
            margin-top: 5px;
        }
        
        .link-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 0.85rem;
            color: #555;
            outline: none;
        }
        
        .copy-link-btn {
            background: var(--maroon);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 5px 10px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* Responsive Improvements */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
            margin-top: 15px;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .admin-container {
                padding: 15px;
            }

            .guest-form {
                flex-direction: column;
                padding: 15px;
                gap: 15px;
            }

            .guest-input, .guest-btn {
                width: 100%;
            }

            th, td {
                padding: 10px;
                font-size: 0.9rem;
            }

            .link-container {
                flex-direction: column;
                align-items: stretch;
            }

            .copy-link-btn {
                width: 100%;
                padding: 8px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
        }
        
        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--dark-tan);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            margin: 0;
            color: var(--maroon);
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #888;
        }
        .close-btn:hover { color: var(--maroon); }
    </style>
</head>
<body>

    <div class="admin-container">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--dark-tan); padding-bottom: 15px; margin-bottom: 20px;">
            <h1 style="border-bottom: none; padding-bottom: 0; margin-bottom: 0;">Manajemen Buku Tamu</h1>
            <button class="guest-btn" onclick="openWishesModal()" style="background-color: #6a3d3a;">
                <i class="fas fa-comments"></i> Manajemen Ucapan
            </button>
        </div>

        <form class="guest-form" id="guestForm">
            <input type="text" id="guestName" class="guest-input" placeholder="Nama Tamu (contoh: Budi Setiawan)" required>
            <select id="guestSession" class="guest-input" required>
                <option value="" disabled selected>Pilih Sesi</option>
                <option value="Sesi 1 (13.00-15.00 WIB)">Sesi 1 (13.00-15.00 WIB)</option>
                <option value="Sesi 2 (18.00-21.00 WIB)">Sesi 2 (18.00-21.00 WIB)</option>
            </select>
            <button type="submit" class="guest-btn" id="submitBtn">
                <i class="fas fa-plus"></i> Tambah Tamu
            </button>
        </form>

        <div id="loader">Memuat daftar tamu...</div>

        <div class="table-responsive">
            <table id="guestTable" style="display: none;">
                <thead>
                    <tr>
                        <th width="5%">No</th>
                        <th width="30%">Nama Tamu & Link Undangan</th>
                        <th width="15%">Sesi</th>
                        <th width="20%">Status Kehadiran</th>
                        <th width="10%">Aksi</th>
                    </tr>
                </thead>
                <tbody id="guestTableBody">
                    <!-- Rows will be added here via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal for Wishes Management -->
    <div id="wishesAdminModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Manajemen Ucapan (Wishes)</h2>
                <button class="close-btn" onclick="closeWishesModal()">&times;</button>
            </div>
            <div id="wishesLoader">Memuat ucapan...</div>
            <div class="table-responsive">
                <table id="wishesTable" style="display: none; width: 100%;">
                    <thead>
                        <tr>
                            <th width="5%">No</th>
                            <th width="20%">Nama & ID</th>
                            <th width="15%">Kehadiran</th>
                            <th width="50%">Pesan</th>
                            <th width="10%">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="wishesTableBody">
                        <!-- Wishes content goes here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- SUPABASE INITIALIZATION ---
        const supabaseUrl = 'https://wdvedlmnapxxfvpyfwqa.supabase.co';
        const supabaseKey = 'sb_publishable_d9czc-ba1h674q5v4BKhAw_ke7rDMe0';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        const guestForm = document.getElementById('guestForm');
        const guestNameInput = document.getElementById('guestName');
        const submitBtn = document.getElementById('submitBtn');
        const guestTable = document.getElementById('guestTable');
        const guestTableBody = document.getElementById('guestTableBody');
        const loader = document.getElementById('loader');

        // Helper: Format Date
        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' };
            return new Date(dateString).toLocaleDateString('id-ID', options);
        }
        
        // Helper: Generate Unique Link using ID instead of Name
        function generateLink(id) {
            // Replace with your actual domain later
            const baseUrl = window.location.origin + window.location.pathname.replace('admin.html', 'index.html');
            return `${baseUrl}?to=${id}`;
        }
        
        // Helper: Generate 5-character Random ID 
        function generateShortId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < 5; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // Function to only copy the Raw Link
        window.copyRawLink = function(inputId, btn) {
            const input = document.getElementById(inputId);
            input.select();
            input.setSelectionRange(0, 99999); // For mobile devices
            document.execCommand('copy');
            
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Disalin';
            btn.style.backgroundColor = '#28a745';
            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.style.backgroundColor = 'var(--maroon)';
            }, 2000);
        };

        // Copy Link Function with formal invitation message
        window.copyTemplateMessage = function(inputId, btn, guestName, guestSession) {
            const input = document.getElementById(inputId);
            const invLink = input.value;
            
            // Format session time correctly based on selected option
            let sessionText = "";
            let timeText = "";
            
            if (guestSession && guestSession.includes("Sesi 1")) {
                sessionText = "Sesi 1";
                timeText = "(13.00-15.00)";
            } else if (guestSession && guestSession.includes("Sesi 2")) {
                sessionText = "Sesi 2";
                timeText = "(18.00-21.00)";
            } else {
                sessionText = guestSession || ''; // Fallback
            }

            const messageToCopy = `Halo, apa kabar??
Semoga sehat selalu ya.

Kami mau berbagi kabar bahagia nih. Melalui pesan ini, kami bermaksud mengundang ${guestName} untuk hadir di acara kami. Berikut detail singkat acaranya:

📅 Tanggal: Jumat, 3 April 2026
📍 Lokasi: Kel. Penggaron Lor Kec. Genuk, Kota Semarang
⏰ Sesi: *${sessionText}* ${timeText}

Untuk detail lengkapnya bisa dilihat di undangan digital melalui link berikut:
${invLink}

Semoga bisa hadir ya, terima kasih banyak 🙏😊`;

            // Create a temporary textarea to hold the formatted message
            var tempTextArea = document.createElement("textarea");
            tempTextArea.value = messageToCopy;
            document.body.appendChild(tempTextArea);
            
            // Select and copy
            tempTextArea.select();
            tempTextArea.setSelectionRange(0, 99999); // For mobile devices
            document.execCommand('copy');
            
            // Cleanup
            document.body.removeChild(tempTextArea);
            
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Tersalin';
            btn.style.backgroundColor = '#28a745';
            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.style.backgroundColor = 'var(--maroon)';
            }, 2000);
        };

        // Fetch Data
        async function fetchGuests() {
            try {
                // We fetch from the new 'guest_list' table
                const { data, error } = await supabaseClient
                    .from('guest_list')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                loader.style.display = 'none';
                guestTable.style.display = 'table';
                guestTableBody.innerHTML = '';

                if (data.length === 0) {
                    guestTableBody.innerHTML = `<tr><td colspan="5" class="empty-state">Belum ada tamu yang didaftarkan.</td></tr>`;
                    return;
                }

                data.forEach((guest, index) => {
                    // Determine badge
                    let badgeHTML = '';
                    if (guest.attendance_status === 'Hadir') {
                        badgeHTML = '<span class="status-badge status-hadir">Hadir</span>';
                    } else if (guest.attendance_status === 'Tidak Hadir') {
                        badgeHTML = '<span class="status-badge status-tidak">Tidak Hadir</span>';
                    } else {
                        badgeHTML = '<span class="status-badge status-pending">Belum Konfirmasi</span>';
                    }
                    
                    const copyId = `link_${guest.id}`;
                    const invLink = generateLink(guest.id);

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${index + 1}</td>
                        <td>
                            <strong>${guest.name}</strong>
                            <div class="link-container">
                                <input type="text" id="${copyId}" class="link-input" value="${invLink}" readonly>
                                <button class="copy-link-btn" onclick="copyRawLink('${copyId}', this)" title="Copy Link Aja">
                                    <i class="fas fa-link"></i> Link
                                </button>
                                <button class="copy-link-btn" style="background-color: #6a3d3a;" onclick="copyTemplateMessage('${copyId}', this, '${guest.name}', '${guest.session || ''}')" title="Copy Template Pesan">
                                    <i class="fab fa-whatsapp"></i> Pesan
                                </button>
                            </div>
                        </td>
                        <td><strong>${guest.session || '-'}</strong></td>
                        <td>${badgeHTML}</td>
                        <td>
                            <button class="action-btn" onclick="deleteGuest('${guest.id}', '${guest.name}')" title="Hapus Tamu">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    `;
                    guestTableBody.appendChild(tr);
                });

            } catch (error) {
                console.error('Error fetching guests:', error);
                loader.innerHTML = '<span style="color:red;">Gagal memuat data. Periksa koneksi atau konfigurasi Supabase.</span>';
            }
        }

        // Add Guest
        guestForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = guestNameInput.value.trim();
            const session = document.getElementById('guestSession').value;
            if (!name || !session) return;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';

            try {
                const shortId = generateShortId();
                const { data, error } = await supabaseClient
                    .from('guest_list')
                    .insert([
                        { 
                            id: shortId,
                            name: name,
                            session: session,
                            attendance_status: 'Pending' // Default status before they confirm
                        }
                    ]);

                if (error) throw error;

                guestNameInput.value = '';
                document.getElementById('guestSession').value = '';
                await fetchGuests(); // Refresh table

            } catch (error) {
                console.error('Error adding guest:', error);
                alert(`Gagal menambahkan tamu. Pesan Error: ${error.message || error.details || error.hint || 'Koneksi bermasalah'}`);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-plus"></i> Tambah Tamu';
            }
        });

        // Delete Guest
        window.deleteGuest = async function(id, name) {
            if (!confirm(`Apakah Anda yakin ingin menghapus tamu "${name}"?`)) return;

            try {
                const { error } = await supabaseClient
                    .from('guest_list')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                
                // Refresh list
                await fetchGuests();
                
            } catch (error) {
                console.error('Error deleting guest:', error);
                alert('Gagal menghapus tamu.');
            }
        };

        // Load initially
        window.addEventListener('DOMContentLoaded', fetchGuests);

        // --- WISHES MANAGEMENT (ADMIN MODAL) ---
        const wishesModal = document.getElementById('wishesAdminModal');
        const wishesTable = document.getElementById('wishesTable');
        const wishesTableBody = document.getElementById('wishesTableBody');
        const wishesLoader = document.getElementById('wishesLoader');

        window.openWishesModal = async function() {
            wishesModal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Stop background scrolling
            await fetchAdminWishes();
        };

        window.closeWishesModal = function() {
            wishesModal.style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        // Close on outside click
        window.addEventListener('click', (e) => {
            if (e.target === wishesModal) closeWishesModal();
        });

        async function fetchAdminWishes() {
            try {
                wishesLoader.style.display = 'block';
                wishesTable.style.display = 'none';
                
                // Fetch wishes
                const { data: wishesData, error: wishesError } = await supabaseClient
                    .from('guest_wishes')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (wishesError) throw wishesError;

                // Fetch guest list for name mapping
                const { data: guestsData, error: guestsError } = await supabaseClient
                    .from('guest_list')
                    .select('id, name');
                
                if (guestsError) throw guestsError;

                // Create ID to Name map
                const guestMap = {};
                if (guestsData) {
                    guestsData.forEach(g => {
                        guestMap[g.id] = g.name;
                    });
                }

                wishesLoader.style.display = 'none';
                wishesTable.style.display = 'table';
                wishesTableBody.innerHTML = '';

                if (wishesData.length === 0) {
                    wishesTableBody.innerHTML = `<tr><td colspan="5" class="empty-state">Belum ada ucapan.</td></tr>`;
                    return;
                }

                wishesData.forEach((wish, index) => {
                    let badgeHTML = '';
                    if (wish.attendance === 'Hadir') {
                        badgeHTML = '<span class="status-badge status-hadir" style="font-size:0.75rem;">Hadir</span>';
                    } else if (wish.attendance === 'Tidak Hadir') {
                        badgeHTML = '<span class="status-badge status-tidak" style="font-size:0.75rem;">Tidak Hadir</span>';
                    } else {
                        badgeHTML = '<span class="status-badge status-pending" style="font-size:0.75rem;">-</span>';
                    }

                    // Get real guest name from Map if ID matches
                    let guestInfo = '';
                    if (wish.guest_id && wish.guest_id !== 'TAMU') {
                        const realName = guestMap[wish.guest_id];
                        if (realName) {
                            guestInfo = `<br><small style="color:#2c7be5; font-weight:600;">${realName}</small>`;
                        } else {
                            guestInfo = `<br><small style="color:#666;">ID: ${wish.guest_id} (Tamu Terhapus)</small>`;
                        }
                    } else {
                        guestInfo = `<br><small style="color:#999;font-style:italic;">(Tamu Publik)</small>`;
                    }

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${index + 1}</td>
                        <td><strong>${wish.name}</strong> ${guestInfo}</td>
                        <td>${badgeHTML}</td>
                        <td>
                            <div style="max-height: 80px; overflow-y: auto; font-size: 0.9rem; padding-right:5px;">
                                ${wish.message}
                            </div>
                            <small style="color:#999; display:block; margin-top:5px;">${formatDate(wish.created_at)}</small>
                        </td>
                        <td>
                            <button class="action-btn" onclick="deleteWish('${wish.id}')" title="Hapus Ucapan">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    `;
                    wishesTableBody.appendChild(tr);
                });
            } catch (error) {
                console.error('Error fetching wishes:', error);
                wishesLoader.innerHTML = '<span style="color:red;">Gagal memuat daftar ucapan.</span>';
            }
        }

        window.deleteWish = async function(id) {
            if (!confirm(`Apakah Anda yakin ingin menghapus ucapan ini?`)) return;

            try {
                const { error } = await supabaseClient
                    .from('guest_wishes')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                
                await fetchAdminWishes(); // Refresh modal table
                
            } catch (error) {
                console.error('Error deleting wish:', error);
                alert('Gagal menghapus: ' + (error.message || error.details || error.hint || 'Tidak diketahui. Periksa console/RLS Supabase.'));
            }
        };

    </script>
</body>
</html>
